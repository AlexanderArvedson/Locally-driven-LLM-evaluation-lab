services:
  runtime:
    build:
      context: ..
      dockerfile: Dockerfile

    container_name: LocallyDrivenLLM_Runtime

    ports:
      - "8000:8000"

    env_file:
      - ../.env

    environment:
      UV_LINK_MODE: copy

    volumes:
      - ..:/app

    depends_on:
      - ollama

    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: my_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: